name: FAQ Chatbot CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run TF-IDF bot smoke test
        run: python src/tfidf_bot.py

      - name: Run RAG bot smoke test (offline embedding backend for CI speed)
        run: |
          python -c "
          from src.rag_bot import RagFAQBot
          bot = RagFAQBot('data/faqs.json', embedding_backend='tfidf-svd')
          result = bot.ask('do you build websites')
          assert result['top_score'] > 0.3, 'Retrieval sanity check failed'
          print('RAG smoke test passed:', result['answer'][:60])
          "

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/safex-faq-chatbot:latest

  # Add a deploy job here once you pick a target (AWS ECS/App Runner,
  # Azure Container Apps, GCP Cloud Run, etc.) — ask your supervisor
  # which cloud SafeX standardizes on before building this out.
